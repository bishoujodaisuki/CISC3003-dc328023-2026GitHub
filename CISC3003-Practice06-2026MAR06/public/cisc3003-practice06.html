<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CISC3003 Practice 06</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page">
    <h1>SHOPPING CART</h1>

    <div class="cart-table-wrapper">
      <table class="cart-table">
        <thead>
          <tr>
            <th colspan="2" scope="col">Product</th>
            <th scope="col">#</th>
            <th scope="col">Price</th>
            <th scope="col">Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr class="cart-row">
            <td class="product-image-cell">
              <img src="images/girl-with-pearl-earring.jpg" alt="Girl with a Pearl Earring">
            </td>
            <td class="product-title-cell">Girl with a Pearl Earring</td>
            <td class="quantity-cell">3</td>
            <td class="price-cell">$80.00</td>
            <td class="amount-cell">$240.00</td>
          </tr>
          <tr class="cart-row">
            <td class="product-image-cell">
              <img src="images/artist-holding-a-thistle.jpg" alt="Artist Holding a Thistle">
            </td>
            <td class="product-title-cell">Artist Holding a Thistle</td>
            <td class="quantity-cell">1</td>
            <td class="price-cell">$125.00</td>
            <td class="amount-cell">$125.00</td>
          </tr>
          <tr class="cart-row">
            <td class="product-image-cell">
              <img src="images/portrait-of-eleanor-of-toledo.jpg" alt="Portrait of Eleanor of Toledo">
            </td>
            <td class="product-title-cell">Portrait of Eleanor of Toledo</td>
            <td class="quantity-cell">2</td>
            <td class="price-cell">$75.00</td>
            <td class="amount-cell">$150.00</td>
          </tr>
        </tbody>
        <tfoot>
          <tr class="summary-row">
            <td colspan="4" class="summary-label">Subtotal</td>
            <td class="summary-value">$515.00</td>
          </tr>
          <tr class="summary-row">
            <td colspan="4" class="summary-label">Tax</td>
            <td class="summary-value">$51.50</td>
          </tr>
          <tr class="summary-row">
            <td colspan="4" class="summary-label">Shipping</td>
            <td class="summary-value">$40.00</td>
          </tr>
          <tr class="summary-row grand-total-row">
            <td colspan="4" class="summary-label">Grand Total</td>
            <td class="summary-value">$606.50</td>
          </tr>
        </tfoot>
      </table>
    </div>
  </main>
</body>
</html>
